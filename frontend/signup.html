<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — MedX</title>
  <meta name="description" content="Create your MedX account to start scanning and identifying medicines instantly.">
  <link rel="stylesheet" href="/css/globals.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="ambient-glow"></div>

  <div class="page-wrapper">
    <div class="auth-page">
      <div class="auth-card glass-card-static">
        <div class="auth-logo">
          <img src="/assets/Logo.jpeg" alt="MedX Logo" class="logo-image">
          MedX
        </div>

        <div class="auth-header">
          <h1 data-i18n="auth_signup_title">Create your account</h1>
          <p data-i18n="auth_signup_subtitle">Start scanning medicines for free</p>
        </div>

        <form class="auth-form" id="signupForm" novalidate>
          <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" class="form-input" id="signupName" data-i18n-placeholder="auth_signup_name" placeholder="Full Name" required autocomplete="name">
          </div>

          <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input type="email" class="form-input" id="signupEmail" data-i18n-placeholder="auth_signup_email" placeholder="Email" required autocomplete="email">
          </div>

          <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" class="form-input" id="signupPassword" data-i18n-placeholder="auth_signup_password" placeholder="Password (min 6 characters)" required autocomplete="new-password" minlength="6">
            <button type="button" class="input-action" id="toggleSignupPassword" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar" id="str1"></div>
            <div class="strength-bar" id="str2"></div>
            <div class="strength-bar" id="str3"></div>
            <div class="strength-bar" id="str4"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="signupSubmitBtn" data-i18n="auth_signup_submit">Create Account</button>
        </form>

        <div class="auth-divider" data-i18n="auth_signup_or">or</div>

        <div class="social-login">
          <button class="btn-social" id="googleSignupBtn">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span data-i18n="auth_signup_google">Continue with Google</span>
          </button>
        </div>

        <div class="auth-footer">
          <span data-i18n="auth_signup_has_account">Already have an account? </span><a href="/login.html" data-i18n="auth_signup_login_link">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/main.js" type="module"></script>
  <script src="/js/auth.js" type="module"></script>
</body>
</html>
